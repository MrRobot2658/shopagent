# Shops Agent — frontend (nginx): serves the static site + proxies /api to backend.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    absolute_redirect off;   # keep redirects relative so the :8090 port is preserved

    # Vercel-style redirects (mirror vercel.json).
    location = / { return 302 /home; }
    location = /fur-expo { return 302 /home; }

    # API → FastAPI backend. proxy_buffering off keeps SSE chat streaming live.
    # resolver + variable defer DNS to request time so nginx doesn't crash at
    # startup if the backend container isn't resolvable yet (Docker DNS = 127.0.0.11).
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream http://backend:8000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # cleanUrls: /admin -> /admin/index.html, /home -> /home/index.html, etc.
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }
}
